name: Fetch Fly.io App Logs

on:
  workflow_dispatch:

jobs:
  logs:
    runs-on: ubuntu-latest
    steps:
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Fetch last 200 log lines
        run: |
          echo "=== FLY STATUS ==="
          flyctl status --app bbg-deal-scout
          echo "=== FLY LOGS ==="
          flyctl logs --app bbg-deal-scout -n 200 2>&1 || true
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
